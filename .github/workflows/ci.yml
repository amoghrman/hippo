name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: "Test / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: hippo
          POSTGRES_PASSWORD: hippo
          POSTGRES_DB: hippo
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra local --extra groq

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://hippo:hippo@localhost:5432/hippo
          OPENAI_API_KEY: test-placeholder-no-real-api-calls
        run: uv run pytest -m "not slow" -v
