version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: hippo
      POSTGRES_PASSWORD: hippo
      POSTGRES_DB: hippo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hippo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
